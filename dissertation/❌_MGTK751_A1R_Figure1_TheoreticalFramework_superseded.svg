<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" font-family="Helvetica, Arial, sans-serif">
  <!-- ===== BLUEPRINT for Figure 1 (theoretical framework); rebuild in Pages. Relational lines only, NO arrowheads (qual = no causal direction). Sensitising framework, to be refined post-analysis. ===== -->
  <style>
    .band   { fill:#eef1f5; stroke:#9aa7b4; stroke-width:1.2; }
    .bandtxt{ fill:#2f3a45; font-size:15px; font-weight:bold; }
    .bandsub{ fill:#54616e; font-size:12px; }
    .tps    { fill:#d9534f; }
    .tpstxt { fill:#ffffff; font-size:17px; font-weight:bold; }
    .tpssub { fill:#ffe3e1; font-size:11px; }
    .cont   { fill:none; stroke:#7f8c99; stroke-width:1.4; stroke-dasharray:4 3; rx:10; }
    .conttl { font-size:13.5px; font-weight:bold; }
    .b1     { fill:#dce9f6; stroke:#7aa3cc; stroke-width:1.1; }
    .b2     { fill:#dcefe1; stroke:#74b487; stroke-width:1.1; }
    .kbv    { fill:#fbeccd; stroke:#cBa766; stroke-width:1.2; }
    .ftxt   { fill:#243038; font-size:12.5px; font-weight:bold; }
    .fsrc   { fill:#5c6770; font-size:10.5px; font-style:italic; }
    .link   { stroke:#9aa7b4; stroke-width:1.4; fill:none; }
    .linkrel{ stroke:#9aa7b4; stroke-width:1.4; stroke-dasharray:5 4; fill:none; }
    .cap    { fill:#5c6770; font-size:11.5px; font-style:italic; }
  </style>

  <!-- Context band -->
  <rect class="band" x="40" y="22" width="1040" height="46" rx="8"/>
  <text class="bandtxt" x="560" y="42" text-anchor="middle">Australian KBF context</text>
  <text class="bandsub" x="560" y="59" text-anchor="middle">egalitarian cultural norm; individual expertise as core commercial output (Feather; Meng; KBV)</text>

  <!-- link context -> TPS -->
  <line class="link" x1="560" y1="68" x2="560" y2="92"/>

  <!-- TPS central node -->
  <rect class="band tps" x="455" y="92" width="210" height="58" rx="10"/>
  <text class="tpstxt" x="560" y="118" text-anchor="middle">Tall Poppy Syndrome</text>
  <text class="tpssub" x="560" y="136" text-anchor="middle">peer marginalisation of high performers (Feather, 1989, 1994)</text>

  <!-- links TPS -> clusters -->
  <line class="link" x1="500" y1="150" x2="290" y2="176"/>
  <line class="link" x1="620" y1="150" x2="840" y2="176"/>

  <!-- ===== RQ1 cluster (Conditions) ===== -->
  <rect class="cont" x="40" y="176" width="490" height="318"/>
  <text class="conttl" x="60" y="198" fill="#3a5a7a">RQ1 — Conditions that exacerbate / alleviate TPS</text>

  <rect class="b1" x="60" y="214" width="215" height="62" rx="8"/>
  <text class="ftxt" x="167" y="240" text-anchor="middle">Performance comparison threat</text>
  <text class="fsrc" x="167" y="258" text-anchor="middle">SCT (Festinger)</text>

  <rect class="b1" x="295" y="214" width="215" height="62" rx="8"/>
  <text class="ftxt" x="402" y="240" text-anchor="middle">Benign vs malicious envy</text>
  <text class="fsrc" x="402" y="258" text-anchor="middle">Sung; Li, Xu &amp; Kwan</text>

  <rect class="b1" x="60" y="290" width="215" height="62" rx="8"/>
  <text class="ftxt" x="167" y="312" text-anchor="middle">Work-group identification</text>
  <text class="ftxt" x="167" y="328" text-anchor="middle">(alleviator)</text>
  <text class="fsrc" x="167" y="345" text-anchor="middle">Kim &amp; Glomb</text>

  <rect class="b1" x="295" y="290" width="215" height="62" rx="8"/>
  <text class="ftxt" x="402" y="316" text-anchor="middle">Reward, recognition &amp; leadership</text>
  <text class="fsrc" x="402" y="334" text-anchor="middle">organisational conditions</text>

  <rect class="b1" x="60" y="366" width="215" height="62" rx="8"/>
  <text class="ftxt" x="167" y="392" text-anchor="middle">Task interdependence</text>
  <text class="fsrc" x="167" y="410" text-anchor="middle">Gully et al.</text>

  <rect class="b1" x="295" y="366" width="215" height="62" rx="8"/>
  <text class="ftxt" x="402" y="392" text-anchor="middle">Cultural egalitarian pressure</text>
  <text class="fsrc" x="402" y="410" text-anchor="middle">Meng et al.; Feather</text>

  <!-- ===== RQ2 cluster (Experience) ===== -->
  <rect class="cont" x="590" y="176" width="490" height="318"/>
  <text class="conttl" x="610" y="198" fill="#3a7a55">RQ2 — How peers experience TPS dynamics</text>

  <rect class="b2" x="610" y="214" width="215" height="62" rx="8"/>
  <text class="ftxt" x="717" y="240" text-anchor="middle">Knowledge-sharing withdrawal</text>
  <text class="fsrc" x="717" y="258" text-anchor="middle">SET (Blau); OCB (Podsakoff)</text>

  <rect class="b2" x="845" y="214" width="215" height="62" rx="8"/>
  <text class="ftxt" x="952" y="240" text-anchor="middle">Ostracism &amp; exclusion</text>
  <text class="fsrc" x="952" y="258" text-anchor="middle">Breidenthal et al.</text>

  <rect class="b2" x="610" y="290" width="215" height="62" rx="8"/>
  <text class="ftxt" x="717" y="316" text-anchor="middle">Team cohesion erosion</text>
  <text class="fsrc" x="717" y="334" text-anchor="middle">Mathieu; Grossman</text>

  <rect class="b2" x="845" y="290" width="215" height="62" rx="8"/>
  <text class="ftxt" x="952" y="316" text-anchor="middle">Trust &amp; reciprocity breakdown</text>
  <text class="fsrc" x="952" y="334" text-anchor="middle">SET (Blau)</text>

  <rect class="b2" x="727" y="366" width="215" height="62" rx="8"/>
  <text class="ftxt" x="834" y="392" text-anchor="middle">Withheld tacit knowledge</text>
  <text class="fsrc" x="834" y="410" text-anchor="middle">KBV-critical loss</text>

  <!-- relational line between clusters (no causal direction) -->
  <line class="linkrel" x1="530" y1="335" x2="590" y2="335"/>
  <text class="cap" x="560" y="328" text-anchor="middle">relational</text>

  <!-- links clusters -> KBV outcome -->
  <line class="link" x1="285" y1="494" x2="430" y2="520"/>
  <line class="link" x1="835" y1="494" x2="690" y2="520"/>

  <!-- KBV outcome band -->
  <rect class="band kbv" x="40" y="520" width="1040" height="52" rx="8"/>
  <text class="bandtxt" x="560" y="543" text-anchor="middle">KM governance &amp; competitive consequence for KBFs</text>
  <text class="bandsub" x="560" y="561" text-anchor="middle">strategic stakes of degraded knowledge integration (KBV — Grant; Kogut &amp; Zander)</text>

  <!-- analysis link note -->
  <text class="cap" x="560" y="600" text-anchor="middle">These themes and factors sensitise (do not dictate) the thematic analysis (§3.4); coding stays inductive, with a disconfirming-evidence node.</text>
  <text class="cap" x="560" y="620" text-anchor="middle">Figure 1. Theoretical Framework — TPS dynamics in Australian KBFs. Relational lines only (no causal direction); provisional, to be refined post-analysis.</text>
</svg>
